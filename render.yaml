services:
  - type: web
    name: outfit-recommendation-backend
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: REACT_APP_WEATHER_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////opt/render/project/src/data/outfit_recommendations.db
    disk:
      name: backend-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
